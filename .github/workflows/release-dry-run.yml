name: Release dry run

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release*.yml"
      - ".github/workflows/publish-crate.yml"
      - "deny.toml"
      - "typos.toml"
      - "docs/src/**"
      - "server.json"
      - "Dockerfile"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Build release
        run: cargo build --release --locked
      - name: Package crate
        run: cargo package --locked
      - name: Dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicates="$(
            cargo tree -d --locked --target x86_64-unknown-linux-gnu |
              awk '/^[0-9]+[[:alnum:]_.-]+ v/ { name=$1; sub(/^[0-9]+/, "", name); print name }' |
              sort -u
          )"
          for duplicate in $duplicates; do
            case "$duplicate" in
              wit-bindgen)
                echo "Ignoring known target-specific duplicate: $duplicate"
                ;;
              *)
                echo "Unexpected duplicate dependency: $duplicate"
                exit 1
                ;;
            esac
          done
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: CLI release smoke
        shell: bash
        run: |
          cargo run --release --locked --bin sourceright -- --version
          cargo run --release --locked --bin sourceright -- bench
