name: Release dry run

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release*.yml"
      - ".github/workflows/publish-crate.yml"
      - ".github/workflows/publish-mcp-registry.yml"
      - "deny.toml"
      - "typos.toml"
      - "conductor/evidence-ledger.json"
      - "conductor/implementation-order.md"
      - "conductor/release-channels.md"
      - "conductor/requirements.md"
      - "conductor/tracks.md"
      - "conductor/tracks/69-marketplace-submission-evidence/**"
      - "conductor/tracks/70-release-surface-refresh-cadence/**"
      - "docs/src/**"
      - "docs-site/src/content/docs/**"
      - "scripts/release-check.ps1"
      - "scripts/release-status.ps1"
      - "scripts/verify-release-surface-refresh.ps1"
      - "tests/public_surface_refresh_policy.rs"
      - "tests/quality_policy.rs"
      - "server.json"
      - "Dockerfile"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Build release
        run: cargo build --release --locked
      - name: Package crate
        run: cargo package --locked
      - name: Generate Cargo dependency SBOM
        shell: bash
        run: cargo metadata --locked --format-version 1 > target/sourceright-cargo-sbom.json
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicate_output="$(cargo tree -d --locked --target x86_64-unknown-linux-gnu 2>&1 || true)"
          unexpected_duplicates="$(
            printf '%s\n' "$duplicate_output" |
              grep -Ev '(^|[[:space:]])wit-bindgen([[:space:]]|$)' |
              grep -E '[[:alnum:]_.-]+[[:space:]]v[0-9]' || true
          )"
          if [ -n "$unexpected_duplicates" ]; then
            printf '%s\n' "$unexpected_duplicates"
            exit 1
          fi
      - name: Verify dependency SBOM
        shell: bash
        run: test -s target/sourceright-cargo-sbom.json
      - name: Generate dry-run package attestation
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: target/package/*.crate
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Advisory public API compatibility
        continue-on-error: true
        run: cargo semver-checks check-release --release-type minor
      - name: CLI release smoke
        shell: bash
        run: |
          cargo run --release --locked --bin sourceright -- --version
          cargo run --release --locked --bin sourceright -- bench
