name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sourceright-linux-x86_64
            binary: sourceright
          - os: macos-latest
            artifact: sourceright-macos-x86_64
            binary: sourceright
          - os: windows-latest
            artifact: sourceright-windows-x86_64.exe
            binary: sourceright.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"; else sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"; fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  crate:
    name: Crate package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Package crate
        run: cargo package --locked
      - name: Upload crate
        uses: actions/upload-artifact@v7
        with:
          name: crate-package
          path: target/package/*.crate

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [package, crate]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
