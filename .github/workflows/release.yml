name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Package crate
        run: cargo package --locked
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicate_output="$(cargo tree -d --locked --target x86_64-unknown-linux-gnu 2>&1 || true)"
          unexpected_duplicates="$(
            printf '%s\n' "$duplicate_output" |
              grep -Ev '(^|[[:space:]])wit-bindgen([[:space:]]|$)' |
              grep -E '[[:alnum:]_.-]+[[:space:]]v[0-9]' || true
          )"
          if [ -n "$unexpected_duplicates" ]; then
            printf '%s\n' "$unexpected_duplicates"
            exit 1
          fi
      - name: Verify clean tree
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=no)"
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: CLI smoke
        shell: bash
        run: |
          cargo run --locked --bin sourceright -- --version
          cargo run --locked --bin sourceright -- --help
          cargo run --locked --bin sourceright -- mcp status --json
          cargo run --locked --bin sourceright -- plugins validate --json

  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sourceright-linux-x86_64
            binary: sourceright
          - os: macos-latest
            artifact: sourceright-macos-x86_64
            binary: sourceright
          - os: windows-latest
            artifact: sourceright-windows-x86_64.exe
            binary: sourceright.exe
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Build
        run: cargo build --release --locked
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"; else sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"; fi
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  crate:
    name: Crate package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Package crate
        run: cargo package --locked
      - name: Generate crate attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: target/package/*.crate
      - name: Upload crate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: crate-package
          path: target/package/*.crate

  oci:
    name: OCI MCP image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/edithatogo/sourceright-mcp:${{ github.ref_name }}
            ghcr.io/edithatogo/sourceright-mcp:latest
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
      - name: Push image
        run: echo "Image pushed by build-push-action"
      - name: Generate image attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/edithatogo/sourceright-mcp
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [release-gate, package, crate, oci]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sourceright-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          generate_release_notes: true
      - name: Generate release status
        run: pwsh -NoProfile -ExecutionPolicy Bypass -Command "& '${{ github.workspace }}/scripts/release-status.ps1' -Surface release -Outcome published -OutputPath release-status.md"
      - name: Upload release status
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-status
          path: release-status.md
