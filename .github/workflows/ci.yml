name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Check
        run: cargo check --locked
      - name: CLI smoke
        shell: bash
        run: |
          cargo run --locked --bin sourceright -- --version
          cargo run --locked --bin sourceright -- --help
          cargo run --locked --bin sourceright -- mcp status --json
          cargo run --locked --bin sourceright -- mcp --json
          cargo run --locked --bin sourceright -- plugins validate --json
          cargo run --locked --bin sourceright -- bench

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package.json
      - name: Install docs site deps
        working-directory: docs-site
        run: npm install
      - name: Build docs site
        working-directory: docs-site
        run: npm run build
      - name: Rust docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicates="$(
            cargo tree -d --locked --target x86_64-unknown-linux-gnu |
              awk '/^[0-9]+[[:alnum:]_.-]+ v/ { name=$1; sub(/^[0-9]+/, "", name); print name }' |
              sort -u
          )"
          for duplicate in $duplicates; do
            case "$duplicate" in
              wit-bindgen)
                echo "Ignoring known target-specific duplicate: $duplicate"
                ;;
              *)
                echo "Unexpected duplicate dependency: $duplicate"
                exit 1
                ;;
            esac
          done

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install typos
        run: cargo install typos-cli --locked
      - name: Check typos
        run: typos --config typos.toml
