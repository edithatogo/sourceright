name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Check
        run: cargo check --locked
      - name: CLI smoke
        shell: bash
        run: |
          cargo run --locked --bin sourceright -- --version
          cargo run --locked --bin sourceright -- --help
          cargo run --locked --bin sourceright -- mcp status --json
          cargo run --locked --bin sourceright -- mcp --json
          cargo run --locked --bin sourceright -- plugins validate --json
          cargo run --locked --bin sourceright -- bench

  docs:
    name: Docs and TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install docs site deps
        working-directory: docs-site
        run: npm ci
      - name: Type-check docs site
        working-directory: docs-site
        run: npm run typecheck
      - name: Build docs site
        working-directory: docs-site
        run: npm run build
      - name: Rust docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicate_output="$(cargo tree -d --locked --target x86_64-unknown-linux-gnu 2>&1 || true)"
          unexpected_duplicates="$(
            printf '%s\n' "$duplicate_output" |
              grep -Ev '(^|[[:space:]])wit-bindgen([[:space:]]|$)' |
              grep -E '[[:alnum:]_.-]+[[:space:]]v[0-9]' || true
          )"
          if [ -n "$unexpected_duplicates" ]; then
            printf '%s\n' "$unexpected_duplicates"
            exit 1
          fi
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Check unused dependencies
        run: cargo machete

  toml:
    name: TOML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Taplo
        run: cargo install taplo-cli --locked
      - name: Lint TOML
        run: taplo lint Cargo.toml book.toml deny.toml lychee.toml rust-toolchain.toml taplo.toml typos.toml fuzz/Cargo.toml plugins/**/*.toml .cargo/config.toml

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install typos
        run: cargo install typos-cli --locked
      - name: Check typos
        run: typos --config typos.toml
