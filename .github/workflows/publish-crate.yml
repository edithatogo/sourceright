name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-crate
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Package crate
        run: cargo package --locked
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicate_output="$(cargo tree -d --locked --target x86_64-unknown-linux-gnu 2>&1 || true)"
          unexpected_duplicates="$(
            printf '%s\n' "$duplicate_output" |
              grep -Ev '(^|[[:space:]])wit-bindgen([[:space:]]|$)' |
              grep -E '[[:alnum:]_.-]+[[:space:]]v[0-9]' || true
          )"
          if [ -n "$unexpected_duplicates" ]; then
            printf '%s\n' "$unexpected_duplicates"
            exit 1
          fi
      - name: Verify package
        run: cargo package --locked
      - name: Verify clean tree
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=no)"
      - name: Generate crate attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: target/package/*.crate
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Generate release status
        shell: bash
        run: |
          tag_value="${GITHUB_REF_NAME:-local}"
          release_version="${GITHUB_REF_NAME#v}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${tag_value}"
          image_ref="ghcr.io/edithatogo/sourceright-mcp:${release_version}"
          cat > release-status.md <<EOF
          # Release status

          - Surface: crate-publish
          - Outcome: published
          - Tag: ${tag_value}
          - Workflow run: ${run_url}
          - GitHub release: ${release_url}
          - OCI image: ${image_ref}
          - Crate publish: tag-triggered publish-crate workflow
          - MCP registry publish: tag-triggered publish-mcp-registry workflow
          - Evidence: checksums, attestations, and clean-tree validation
          EOF
      - name: Upload release status
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-status
          path: release-status.md
