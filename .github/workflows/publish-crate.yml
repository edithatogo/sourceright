name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-crate
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Package crate
        run: cargo package --locked
      - name: Generate Cargo dependency SBOM
        shell: bash
        run: cargo metadata --locked --format-version 1 > target/sourceright-cargo-sbom.json
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicate_output="$(cargo tree -d --locked --target x86_64-unknown-linux-gnu 2>&1 || true)"
          unexpected_duplicates="$(
            printf '%s\n' "$duplicate_output" |
              grep -Ev '(^|[[:space:]])wit-bindgen([[:space:]]|$)' |
              grep -E '[[:alnum:]_.-]+[[:space:]]v[0-9]' || true
          )"
          if [ -n "$unexpected_duplicates" ]; then
            printf '%s\n' "$unexpected_duplicates"
            exit 1
          fi
      - name: Verify package
        run: cargo package --locked
      - name: Release surface evidence
        shell: pwsh
        run: ./scripts/verify-release-surface-refresh.ps1
      - name: Verify clean tree
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=no)"
      - name: Generate crate attestation
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: target/package/*.crate
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Generate release status
        shell: pwsh
        run: .\scripts\release-status.ps1 -Surface crate-publish -Outcome published -Tag $env:GITHUB_REF_NAME -OutputPath release-status.md
      - name: Upload release status
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-status
          path: release-status.md
      - name: Upload Cargo dependency SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-dependency-sbom
          path: target/sourceright-cargo-sbom.json
