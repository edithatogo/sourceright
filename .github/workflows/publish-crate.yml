name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-crate
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Package crate
        run: cargo package --locked
      - name: Check dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources
          duplicates="$(
            cargo tree -d --locked --target x86_64-unknown-linux-gnu |
              awk '/^[0-9]+[[:alnum:]_.-]+ v/ { name=$1; sub(/^[0-9]+/, "", name); print name }' |
              sort -u
          )"
          for duplicate in $duplicates; do
            case "$duplicate" in
              wit-bindgen)
                echo "Ignoring known target-specific duplicate: $duplicate"
                ;;
              *)
                echo "Unexpected duplicate dependency: $duplicate"
                exit 1
                ;;
            esac
          done
      - name: Verify package
        run: cargo package --locked
      - name: Verify clean tree
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=no)"
      - name: Generate crate attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: target/package/*.crate
      - name: Publish dry run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Generate release status
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/release-status.ps1 -Surface crate-publish -Outcome published -OutputPath release-status.md
      - name: Upload release status
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-status
          path: release-status.md
