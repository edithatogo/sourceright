name: Publish MCP registry metadata

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-latest
    environment: mcp-registry
    env:
      MCP_PUBLISHER_VERSION: v1.7.8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish metadata
        run: ./mcp-publisher publish
