name: Publish MCP registry metadata

on:
  # zizmor: ignore[dangerous-triggers] Release-owned registry publication is
  # intentionally chained from the tag-only Release workflow and still uses
  # the protected mcp-registry environment.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: mcp-registry
    env:
      MCP_PUBLISHER_VERSION: v1.7.8
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve source ref
        id: source-ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "ref=$WORKFLOW_RUN_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ steps.source-ref.outputs.ref }}
      - name: Validate server metadata
        run: |
          python3 - <<'PY'
          import json
          with open("server.json", "r", encoding="utf-8") as handle:
              data = json.load(handle)
          assert data["name"] == "io.github.edithatogo/sourceright"
          assert data["packages"][0]["transport"]["type"] == "stdio"
          PY
      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(python3 - <<'PY'
          import json
          with open("server.json", "r", encoding="utf-8") as handle:
              print(json.load(handle)["version"])
          PY
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Verify clean tree
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=no)"
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait for MCP image
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if docker manifest inspect ghcr.io/edithatogo/sourceright-mcp:${{ steps.version.outputs.version }} >/dev/null 2>&1; then
              exit 0
            fi
            echo "Waiting for ghcr.io/edithatogo/sourceright-mcp:${{ steps.version.outputs.version }} (attempt ${attempt}/30)"
            sleep 20
          done
          echo "Timed out waiting for ghcr.io/edithatogo/sourceright-mcp:${{ steps.version.outputs.version }}"
          exit 1
      - name: Download mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish metadata
        run: ./mcp-publisher publish
      - name: Generate release status
        shell: pwsh
        run: .\scripts\release-status.ps1 -Surface mcp-registry -Outcome submitted -Tag $env:GITHUB_REF_NAME -OutputPath release-status.md
      - name: Upload release status
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-status
          path: release-status.md
