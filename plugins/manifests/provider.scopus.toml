[plugin]
id = "provider.scopus"
name = "Scopus provider"
category = "provider"
status = "planned_byo_key"
plugin_api = "sourceright.plugin.v1"
license_profile = "licensed_data"
summary = "Licensed Scopus enrichment as an optional BYO-key provider."

[auth]
required = true
mode = "byo_api_key"
env = ["SCOPUS_API_KEY"]

[runtime]
network = true
default_enabled = false
live_tests_default = false

[cache]
policy = "licence-aware metadata caching only"
retention = "licensed_data_restricted"

[contracts]
reads = ["references.csl.json"]
writes = ["sourceright.verification.v1"]
